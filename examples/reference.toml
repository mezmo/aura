# Full-featured Aura configuration reference.
# This file demonstrates all available configuration sections.
# Copy it to config.toml and customize for your environment:
#
#   cp examples/reference.toml config.toml
#
# Minimal configs (just add an API key):
#   examples/minimal/openai.toml     - OpenAI (GPT-4o)
#   examples/minimal/anthropic.toml  - Anthropic (Claude)
#   examples/minimal/ollama.toml     - local Ollama models, no API key needed
#   examples/minimal/bedrock.toml    - AWS Bedrock
#   examples/minimal/gemini.toml     - Google Gemini
#
# Complete agent configs (LLM + MCP tools + system prompts):
#   examples/complete/incident-response-mezmo.toml    - PagerDuty + Mezmo
#   examples/complete/incident-response-datadog.toml  - PagerDuty + Datadog
#   examples/complete/kubernetes-sre.toml             - K8s MCP + Prometheus
#   examples/complete/devops-assistant.toml           - GitHub MCP

# ── LLM Provider ────────────────────────────────────────────────────
[llm]
provider = "openai"
api_key = "{{ env.OPENAI_API_KEY }}"
model = "gpt-5.2"
# max_tokens = 8192
# base_url = "https://api.openai.com/v1"  # custom endpoint

# Anthropic alternative:
# provider = "anthropic"
# api_key = "{{ env.ANTHROPIC_API_KEY }}"
# model = "claude-sonnet-4-20250514"

# Ollama alternative (no API key needed):
# provider = "ollama"
# model = "qwen3:30b-a3b"
# fallback_tool_parsing = true

# AWS Bedrock alternative:
# provider = "bedrock"
# model = "us.anthropic.claude-3-5-sonnet-20241022-v2:0"
# region = "{{ env.AWS_REGION }}"

# Google Gemini alternative:
# provider = "gemini"
# api_key = "{{ env.GOOGLE_API_KEY }}"
# model = "gemini-2.0-flash"

# ── MCP Tool Servers ────────────────────────────────────────────────
[mcp]
# Sanitize tool schemas for OpenAI function-calling compatibility.
# Fixes common issues like anyOf unions, missing types, and optional
# parameters that OpenAI's strict mode rejects. Safe to leave enabled.
sanitize_schemas = true

# ── HTTP Streamable transport (recommended for production) ──────────
# Connect to any MCP server that exposes an HTTP endpoint.
[mcp.servers.example_http]
transport = "http_streamable"
url = "http://localhost:8081/mcp"
description = "Example HTTP MCP server"

# Static headers sent with every request.
[mcp.servers.example_http.headers]
Authorization = "Bearer {{ env.MCP_TOKEN }}"

# ── Header forwarding ───────────────────────────────────────────────
# Forward headers from the incoming HTTP request to an MCP server.
# Useful for per-user auth delegation (e.g., the chat UI sends a
# user token that gets forwarded to the MCP server).
#
# [mcp.servers.auth_aware_server]
# transport = "http_streamable"
# url = "http://localhost:8082/mcp"
# description = "MCP server with per-request auth"
#
# [mcp.servers.auth_aware_server.headers_from_request]
# # Maps: outgoing header name = incoming request header name
# Authorization = "x-user-token"

# ── Vector Stores (RAG) ────────────────────────────────────────────
# Connects to an external Qdrant instance. The agent gets a
# vector_search tool it can call to retrieve relevant documents.
#
# Prerequisites:
#   docker run -p 6333:6333 -p 6334:6334 qdrant/qdrant
#
# You need to index documents into Qdrant before the agent can search
# them. See the Qdrant documentation for ingestion options:
#   https://qdrant.tech/documentation/concepts/collections/
#
# [[vector_stores]]
# name = "docs"
# type = "qdrant"
# url = "http://localhost:6334"
# collection_name = "documents"
# context_prefix = "Technical documentation and API references"
#
# [vector_stores.embedding_model]
# provider = "openai"
# model = "text-embedding-3-small"
# api_key = "{{ env.OPENAI_API_KEY }}"

# You can add multiple vector stores. Each one becomes a separate
# search tool the agent can call (e.g., vector_search_docs,
# vector_search_runbooks).
#
# [[vector_stores]]
# name = "runbooks"
# type = "qdrant"
# url = "http://localhost:6334"
# collection_name = "runbooks"
# context_prefix = "Operational runbooks and troubleshooting guides"
#
# [vector_stores.embedding_model]
# provider = "openai"
# model = "text-embedding-3-small"
# api_key = "{{ env.OPENAI_API_KEY }}"

# ── Tools ───────────────────────────────────────────────────────────
[tools]
filesystem = false
custom_tools = []

# ── Agent ───────────────────────────────────────────────────────────
[agent]
name = "Assistant"
system_prompt = """
You are a helpful assistant with access to external tools and
knowledge bases. Use them to provide accurate, grounded answers.

Workflow:
1. Gather evidence using available tools and context.
2. Correlate findings across sources.
3. Return actionable findings and next steps.
"""
# reasoning_effort = "medium"  # minimal, low, medium, high (provider support varies)
# temperature = 0.7
# Maximum tool-calling rounds per user turn. Higher values allow
# deeper multi-step workflows but consume more tokens.
turn_depth = 5
