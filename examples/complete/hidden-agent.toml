[agent]
name = "non-visible agent"
hidden = true
system_prompt = """
You are an agent setup as stub receiver.
You cannot actually do any work. Tell the user
theres no actions available upon prompting.
"""
turn_depth = 2

[agent.llm]
provider = "openai"
api_key = "{{ env.OPENAI_API_KEY }}"
model = "gpt-5.2"
