# compose/test.yml
# Test runner configuration for integration tests
#
# Silences infrastructure services and runs the test suite.
#
# Usage:
#   docker compose -f compose/base.yml -f compose/test.yml up --build --exit-code-from aura-integration-test

services:
  mock-mcp:
    attach: false
    logging:
      driver: "none"

  aura-web-server:
    attach: false
    logging:
      driver: "none"
    environment:
      # Publish the in-network address the test runner reaches us on, so the
      # A2A agent card carries absolute URLs that resolve inside the compose
      # network. Must match the test runner's AURA_SERVER_URL below.
      AURA_SERVER_URL: http://aura-web-server:8080

  aura-integration-test:
    # CI preloads this tag from the Build Images stage; without --build,
    # compose uses it as-is.
    image: ${AURA_TEST_IMAGE:-local/aura-test:dev}
    build:
      context: ../
      dockerfile: Dockerfile
      target: test
    environment:
      AURA_SERVER_URL: http://aura-web-server:8080
      MCP_SERVER_URL: http://mock-mcp:9998
      MCP_MOCK_SERVER_URL: http://mock-mcp:9999
      CI: true
      ENABLE_DOCKER: false
      AURA_AUTO_DOWNLOAD: false
      # Compiler cache for the in-container coverage compile. Opt-in: CI
      # sets the AURA_ toggle plus the SCCACHE_/AWS_ values; the empty
      # defaults leave cargo behavior unchanged (an empty wrapper var is
      # treated as unset). The workspace wrapper, not RUSTC_WRAPPER, so
      # the deps baked by cook-debug keep their fingerprints.
      RUSTC_WORKSPACE_WRAPPER: ${AURA_RUSTC_WORKSPACE_WRAPPER:-}
      SCCACHE_BUCKET: ${SCCACHE_BUCKET:-}
      SCCACHE_REGION: ${SCCACHE_REGION:-}
      SCCACHE_S3_KEY_PREFIX: ${SCCACHE_S3_KEY_PREFIX:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      # sccache refuses incremental compiles, and incremental state cannot
      # survive the ephemeral container anyway.
      CARGO_INCREMENTAL: "0"
    volumes:
      # Shared volume for marker files (written by slow_task, read by tests)
      # Uses /tmp since that's where slow_task writes marker files
      - mcp-markers:/tmp
      # report directory for ci to read from
      - $PWD/report:/home/aura/report
      # nextest config
      - $PWD/.config:/home/aura/.config
      # config and example files needed by test_all_shipped_configs_parse
      - $PWD/configs:/home/aura/configs:ro
      - $PWD/examples:/home/aura/examples:ro
      - $PWD/quickstart.toml:/home/aura/quickstart.toml:ro
    env_file:
      - ./env/test.env
    depends_on:
      aura-web-server:
        condition: service_healthy
    # Run integration tests with code coverage
    command: make coverage
