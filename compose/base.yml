# compose/base.yml
# Infrastructure services for aura integration tests
#
# This file defines the core services:
# - mock-mcp: Python FastMCP (9999) + Rust cancellation server (9998)
# - aura-web-server: The main aura API server (8080)
#
# Usage:
#   docker compose -f compose/base.yml up -d
#   docker compose -f compose/base.yml -f compose/dev.yml up -d

services:
  # Single container running BOTH mock MCP servers:
  # - Python FastMCP (port 9999) - general tool mocking
  # - Rust cancellation server (port 9998) - cancellation/progress tests
  mock-mcp:
    # Use Docker Hub image
    image: ${MOCK_MCP_IMAGE:-mezmo/aura-mock-mcp:latest}
 
    volumes:
      # Shared volume for marker files (written by slow_task, read by tests)
      # Uses /tmp since that's where slow_task writes marker files
      - mcp-markers:/tmp
    healthcheck:
      # Verify both MCP servers respond to initialize
      # FastMCP requires Accept headers for both JSON and SSE
      test: >
        curl -sf http://localhost:9999/mcp -X POST
        -H "Content-Type: application/json"
        -H "Accept: application/json, text/event-stream"
        -d '{"jsonrpc":"2.0","method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"healthcheck","version":"1.0"}},"id":1}'
        > /dev/null &&
        curl -sf http://localhost:9998/mcp -X POST
        -H "Content-Type: application/json"
        -H "Accept: application/json, text/event-stream"
        -d '{"jsonrpc":"2.0","method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"healthcheck","version":"1.0"}},"id":1}'
        > /dev/null || exit 1
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  aura-web-server:
    build:
      context: ../
      dockerfile: Dockerfile
    environment:
      # API keys (passed from host environment or .env file)
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      # Server configuration
      HOST: 0.0.0.0
      PORT: 8080
      # AURA_SERVER_URL (the canonical origin published in the A2A agent card) is
      # set per-topology in the test.yml / dev.yml overlays so it matches the URL
      # the test runner actually reaches the server on. Unset here, the server
      # falls back to http://127.0.0.1:8080 for ad-hoc base-only runs.
      CONFIG_PATH: /app/config/test-config.toml
      # MCP server hostname (Docker service name)
      MCP_MOCK_HOST: mock-mcp
      # Tool result format
      TOOL_RESULT_MODE: open-web-ui
      # Enable custom aura events for testing
      AURA_CUSTOM_EVENTS: true
      # Enable A2A endpoints
      AURA_ENABLE_A2A: true
      # Logging
      RUST_LOG: warn
      # Optional host-provided OTel settings for local integration gates.
      OTEL_EXPORTER_OTLP_ENDPOINT:
      OTEL_RECORD_CONTENT:
      OTEL_CONTENT_MAX_LENGTH:
      OTEL_ATTRIBUTE_VALUE_LENGTH_LIMIT:
      OTEL_SERVICE_NAME:
    env_file:
      - ./env/test.env
    volumes:
      # Mount test config
      - ../crates/aura-web-server/tests/test-config.toml:/app/config/test-config.toml:ro
    depends_on:
      mock-mcp:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

volumes:
  # Shared volume for marker files between mock-mcp and test runner
  mcp-markers:
