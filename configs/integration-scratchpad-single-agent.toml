# Integration test configuration for single-agent scratchpad mode.
# Used by: compose/scratchpad.yml → compose/scratchpad-test.yml
#
# Mirrors integration-scratchpad.toml but with [orchestration] omitted so the
# request flows through the single-agent path. Lets the integration suite
# exercise the same scratchpad interception/exploration/event-emission logic
# that orchestration workers exercise, but via Agent::stream_*_with_timeout
# (the path that wires LLM ground-truth feedback through the streaming hook).

# Top-level persistence directory. In single-agent mode this becomes
# {memory_dir}/scratchpad/ for intercepted-output files.
memory_dir = "/tmp/aura-scratchpad-single-agent-test"

[agent]
name = "Scratchpad Single-Agent Test"
alias = "scratchpad-single"
system_prompt = """
You are a data retrieval and analysis assistant with scratchpad capability.

When you call a tool and the output is too large to fit in context, you will
receive a pointer like [scratchpad: file_id=...]. When you see this:
1. Use the scratchpad exploration tools (head, slice, grep, schema, get_in,
   iterate_over, item_schema, read) to selectively read the data you need.
2. Do NOT try to re-call the original tool — the data is already saved.
3. Extract only the specific fields or sections needed to answer the question.

Always use the exploration tools to answer questions about large datasets.
Report the actual values you find — do not fabricate data.
"""
turn_depth = 10

[agent.llm]
provider = "openai"
api_key = "{{ env.OPENAI_API_KEY }}"
model = "gpt-5.1"
temperature = 0.1
context_window = 128000

# Single-agent scratchpad config. turn_depth_bonus auto-extends the ReAct loop
# to leave room for exploration tool calls after interception.
[agent.scratchpad]
enabled = true
context_safety_margin = 0.20
max_extraction_tokens = 10_000
turn_depth_bonus = 6

[mcp]
sanitize_schemas = true

[mcp.servers.scratchpad-test]
transport = "http_streamable"
url = "http://scratchpad-test-mcp:8083/mcp"
headers = {}
description = "Scratchpad test tools: returns controlled-size datasets for testing context window management"

# Per-tool interception thresholds (min_tokens). Tool names matched via glob.
[mcp.servers.scratchpad-test.scratchpad]
"sp_get_large_*" = { min_tokens = 50 }        # Low threshold — large tools always intercepted
"sp_get_small_*" = { min_tokens = 99999 }     # High threshold — small tools never intercepted
"sp_get_boundary_json" = { min_tokens = 125 } # Exact boundary for threshold tests
"sp_get_nested_json" = { min_tokens = 50 }    # Always intercepted
