# Integration test configuration for SRE orchestration mode
# Used by: compose/sre-orchestration.yml → compose/sre-orchestration-test.yml
# Exercises multi-worker Kubernetes observability workflow:
# discover workloads → detect metrics → configure ServiceMonitors → query Prometheus → alert

[agent]
name = "SRE Orchestrator Test"
system_prompt = """
You are an SRE assistant coordinator. You decompose Kubernetes observability
tasks into specialized sub-tasks and delegate to the appropriate worker.

ROUTING GUIDANCE:
- Workload discovery, namespace listing, service inspection: delegate to k8s-discovery
- Prometheus queries, target health, metric metadata: delegate to prometheus-analyst
- Creating ServiceMonitors, alerting rules, applying manifests: delegate to monitoring-engineer
- Multi-domain tasks (e.g., discover then monitor): create a plan with multiple workers
- Simple factual questions about the cluster: answer directly if possible
"""
turn_depth = 8

[agent.llm]
provider = "openai"
api_key = "{{ env.OPENAI_API_KEY }}"
model = "gpt-5.1"
temperature = 0.3

[mcp]
sanitize_schemas = true

[mcp.servers.k8s-sre]
transport = "http_streamable"
url = "http://k8s-sre-mcp:8082/mcp"
headers = {}
description = "Kubernetes SRE tools: cluster discovery, Prometheus metrics, Alertmanager rules, and ServiceMonitor management"

[orchestration]
enabled = true
max_planning_cycles = 3
quality_threshold = 0.7
allow_direct_answers = true
allow_clarification = true
tools_in_planning = "full"

[orchestration.timeouts]
per_call_timeout_secs = 60

[orchestration.artifacts]
memory_dir = "/tmp/aura-sre-orchestration-test"

[orchestration.worker.k8s-discovery]
description = "Kubernetes workload and service discovery: list namespaces, workloads, services, and inspect details"
turn_depth = 8
mcp_filter = ["k8s_list_namespaces", "k8s_list_workloads", "k8s_get_workload", "k8s_list_services", "k8s_get_service"]
preamble = """
You are a Kubernetes Discovery Specialist. Use your tools to explore the cluster.
Always use tools — do not guess or fabricate cluster state.
Report workload names, kinds, replicas, labels, ports, and annotations.
"""

[orchestration.worker.prometheus-analyst]
description = "Prometheus metrics analysis: query metrics, check targets, inspect metadata and labels"
turn_depth = 5
mcp_filter = ["prometheus_query", "prometheus_targets", "prometheus_metric_metadata", "prometheus_label_values"]
preamble = """
You are a Prometheus Analyst. Use your tools to query and analyze metrics.
Always call the appropriate tool — do not fabricate metric values.
Report query results clearly with metric names, labels, and values.
"""

[orchestration.worker.monitoring-engineer]
description = "Monitoring configuration: create ServiceMonitors, apply manifests, manage alerting rules"
turn_depth = 8
mcp_filter = ["k8s_apply_manifest", "k8s_list_service_monitors", "alertmanager_get_status", "alertmanager_get_alerts", "alertmanager_get_rules", "alertmanager_create_rule"]
preamble = """
You are a Monitoring Engineer. Use your tools to configure observability.
When creating ServiceMonitors, generate valid YAML with correct apiVersion,
kind, metadata, and spec. When creating alert rules, provide meaningful
expressions and annotations. Always verify existing monitors before creating duplicates.
"""
